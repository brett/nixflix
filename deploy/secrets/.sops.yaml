keys:
  # Test age key — for CI and development only, NOT for production.
  # Generated with: age-keygen -o /path/to/key.txt
  # Store the private key at: ~/.config/sops/age/keys.txt (never commit it)
  - &test-age age1dpytxdj0d2pza45ganrc0xmlggf9clllal9ey0yatfyc92fze33sx64dup

  # Production key placeholder — replace with your real age public key before deploying.
  # - &prod-age age1REPLACEME...

creation_rules:
  - path_regex: deploy/secrets/.*\.yaml$
    key_groups:
      - age:
          - *test-age
